<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>神経衰弱 × ブラックジャック</title>
  <link rel="stylesheet" href="game.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>神経衰弱 × ブラックジャック</h1>
      <p class="tagline">合計21で追加ターン。22以上はめくった札を元に戻す</p>
    </header>

    <section id="setup" class="panel setup" aria-label="ゲーム開始">
      <div class="setup-block">
        <h2>対戦設定</h2>
        <label class="setup-label setup-label-inline">
          <input type="checkbox" id="cpuOpponent" />
          CPUと対戦する
        </label>
        <div class="setup-cpu-first hidden" id="cpuFirstWrap">
          <div class="setup-options setup-cpu-first-options">
            <label class="setup-label">
              <input type="radio" name="cpuFirst" value="human" checked />
              先攻
            </label>
            <label class="setup-label">
              <input type="radio" name="cpuFirst" value="cpu" />
              後攻
            </label>
            <label class="setup-label">
              <input type="radio" name="cpuFirst" value="random" />
              ランダム
            </label>
          </div>
        </div>
        <div class="setup-cpu-delay hidden" id="cpuDelayWrap">
          <div class="setup-cpu-delay-row">
            <label class="setup-delay-label" for="cpuRevealSec">CPUがめくった札を確認する時間（秒）</label>
            <input
              type="number"
              id="cpuRevealSec"
              min="0.5"
              max="30"
              step="0.5"
              value="3"
            />
          </div>
        </div>
        <div class="setup-cpu-delay">
          <div class="setup-cpu-delay-row">
            <label class="setup-delay-label" for="secondShuffleCount">後攻プレイヤーのシャッフル回数</label>
            <input
              type="number"
              id="secondShuffleCount"
              min="0"
              max="20"
              step="1"
              value="2"
            />
          </div>
        </div>
      </div>
      <div class="setup-block">
        <h2>勝敗の決め方</h2>
        <div class="setup-options">
          <label class="setup-label">
            <input type="radio" name="winMode" value="score" checked />
            取得した札の「数字の合計」が大きい人が勝ち
          </label>
          <label class="setup-label">
            <input type="radio" name="winMode" value="cards" />
            取得枚数が多い人が勝ち
          </label>
        </div>
      </div>
      <div class="setup-block">
        <h2>札の数え方</h2>
        <p class="setup-note">合計21・バスト判定、および「数字の合計」勝ちの集計に使います。</p>
        <div class="setup-options">
          <span class="setup-sub">絵札（J・Q・K）</span>
          <label class="setup-label">
            <input type="radio" name="pictureMode" value="rank" checked />
            数字のまま（11・12・13）
          </label>
          <label class="setup-label">
            <input type="radio" name="pictureMode" value="ten" />
            すべて10として数える（ブラックジャック風）
          </label>
          <span class="setup-sub">エース（A）</span>
          <label class="setup-label">
            <input type="radio" name="aceMode" value="one" checked />
            数字の 1 のまま
          </label>
          <label class="setup-label">
            <input type="radio" name="aceMode" value="soft" />
            1 または 11 として数え、手札の合計が最適になるようにする
          </label>
        </div>
      </div>
      <div class="setup-block">
        <h2>バスト時の処理</h2>
        <div class="setup-options">
          <label class="setup-label">
            <input type="radio" name="bustMode" value="lastBack" checked />
            バストした札だけ戻し、それまでの札は取得する
          </label>
          <label class="setup-label">
            <input type="radio" name="bustMode" value="allBack" />
            めくった札をすべて元に戻す
          </label>
        </div>
      </div>
      <button type="button" id="btnStart" class="btn btn-primary" disabled>スタート</button>
    </section>

    <section id="playArea" class="play hidden" aria-live="polite">
      <aside class="sidebar">
        <div class="status card-panel status-panel">
          <p id="turnLabel" class="turn-label"></p>
          <p id="sessionSum" class="session-sum"></p>
          <p id="message" class="message" role="status"></p>
        </div>
        <div id="playersList" class="players"></div>
        <div class="actions card-panel">
          <button type="button" id="btnOutcomeOk" class="btn btn-confirm btn-block hidden">確認完了</button>
          <button type="button" id="btnStand" class="btn btn-primary" disabled>ターン終了</button>
          <label class="shuffle-option">
            <input type="checkbox" id="chkStandShuffle" />
            <span id="shuffleLabelText">シャッフル（残 2 回）</span>
          </label>
        </div>
        <button type="button" id="btnNewGame" class="btn btn-ghost btn-block hidden" aria-hidden="true">新しいゲーム</button>
      </aside>
      <div class="table-wrap">
        <div class="board-axis-wrap" aria-label="場のカード座標">
          <div class="axis-corner" aria-hidden="true"></div>
          <div id="axisTop" class="axis axis-top" aria-hidden="true"></div>
          <div id="axisLeft" class="axis axis-left" aria-hidden="true"></div>
          <div id="grid" class="grid" aria-label="場のカード"></div>
        </div>
      </div>
    </section>
  </div>
  <script src="game.js"></script>
</body>
</html>
